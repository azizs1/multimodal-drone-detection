name: Release Build & Tag

on:
  push:
    tags:
      - "v*"

jobs:
  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Package build
        run: |
          tar -czf frontend-build.tgz \
            -C frontend .next public package.json package-lock.json next.config.mjs postcss.config.mjs tailwind.config.js 2>/dev/null || true
          ls -lh frontend-build.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-build.tgz
          if-no-files-found: error

  backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t drone-detection-backend:${{ github.ref_name }} -f backend/Dockerfile .

      - name: Save image
        run: docker save drone-detection-backend:${{ github.ref_name }} -o backend-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar
          if-no-files-found: error

  jetson-image:
    name: Build Jetson image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t jetson-si-ml:${{ github.ref_name }} \
            -f jetson/Dockerfile . \
            --load

      - name: Save image
        run: docker save jetson-si-ml:${{ github.ref_name }} -o jetson-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jetson-image
          path: jetson-image.tar
          if-no-files-found: error

  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-image, jetson-image]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: ls -R artifacts

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          artifacts: |
            artifacts/frontend-build/frontend-build.tgz
            artifacts/backend-image/backend-image.tar
            artifacts/jetson-image/jetson-image.tar
          artifactContentType: application/octet-stream
          generateReleaseNotes: true
